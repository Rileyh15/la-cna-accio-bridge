# CI/CD Pipeline 芒聙聰 LA CNA Registry 芒聠聰 Accio Data Bridge
#
# Runs on every push and PR to main:
#   1. Security scan (bandit + safety)
#   2. Unit tests (pytest)
#   3. Docker build verification
#   4. Source code SSN leak detection
# 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit security scan
        run: bandit -r . -x ./tests -ll -ii

      - name: SSN leak detection in source
        run: |
          # Scan for any 9-consecutive-digit patterns that could be SSNs
          if grep -rn '\b[0-9]\{9\}\b' la_cna_accio_bridge.py la_cna_playwright_fallback.py; then
            echo "::error::Potential SSN pattern detected in source code!"
            exit 1
          fi
          # Scan for SSN-with-dashes pattern
          if grep -rn '\b[0-9]\{3\}-[0-9]\{2\}-[0-9]\{4\}\b' la_cna_accio_bridge.py la_cna_playwright_fallback.py; then
            echo "::error::Potential SSN pattern (with dashes) detected in source code!"
            exit 1
          fi
          echo "No SSN patterns found in source code."

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [security-scan, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t la-cna-accio-bridge:test .

      - name: Verify health endpoint
        run: |
          # Start container with dummy env vars (won't make real API calls)
          docker run -d --name test-bridge \
            -p 8080:8080 \
            -e ACCIO_API_BASE_URL=https://test.example.com \
            -e ACCIO_API_ACCOUNT=test \
            -e ACCIO_API_USERNAME=test \
            -e ACCIO_API_PASSWORD=test \
            -e WEBHOOK_SECRET=test_secret_key_for_ci \
            la-cna-accio-bridge:test

          # Wait for startup
          sleep 5

          # Check health endpoint
          curl -f http://localhost:8080/health || exit 1

          # Cleanup
          docker stop test-bridge
          docker rm test-bridge

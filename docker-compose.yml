# ══════════════════════════════════════════════════════════════════════
# LA CNA Registry Bridge — Docker Compose
#
# Usage:
#   docker compose up -d        # Start the service
#   docker compose logs -f      # View non-PII operational logs
#   docker compose down         # Stop the service
# ══════════════════════════════════════════════════════════════════════

version: "3.9"

services:
  cna-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: la-cna-accio-bridge
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      # All secrets injected via environment variables — NEVER hardcode
      - ACCIO_API_BASE_URL=${ACCIO_API_BASE_URL}
      - ACCIO_API_ACCOUNT=${ACCIO_API_ACCOUNT}
      - ACCIO_API_USERNAME=${ACCIO_API_USERNAME}
      - ACCIO_API_PASSWORD=${ACCIO_API_PASSWORD}
      - ACCIO_API_MODE=${ACCIO_API_MODE:-PROD}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - MAX_CONCURRENT_LOOKUPS=${MAX_CONCURRENT_LOOKUPS:-3}
      - HTTP_TIMEOUT_SECONDS=${HTTP_TIMEOUT_SECONDS:-30}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - PORT=5000
    # Security: no persistent volumes, read-only filesystem
    read_only: true
    tmpfs:
      - /tmp:size=64M,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:5000/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
